---
layout: layouts/base.html
title: Nate Goldman
description: Software Engineer
stylesheets:
  - /index.css
particles:
  a: 0.3
  distance: 123
  speed: 0.3
---
<main>
  <header>
    <p>
      <u>Nate Goldman</u>
      <br>
      web developer
    </p>
  </header>

  <ul class="social links">
    <li>␀</li>
    {%- for link in links %}
    <li><a rel="me" title="{{ link.title }}"{% if link.hidden %} style="display:none"{% endif %} href="{{ link.url }}">{{ link.title }}</a></li>
    {%- endfor %}
    <li>␆</li>
  </ul>
</main>

<canvas id="canvas"></canvas>

<script src="particles.js"></script>
<script>
  particles({
    a: {{ particles.a }},
    distance: {{ particles.distance }},
    speed: {{ particles.speed }}
  })
</script>
