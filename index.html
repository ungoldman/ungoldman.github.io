---
layout: layouts/base.html
title: Nate Goldman
description: Software Engineer
stylesheets:
  - /index.css
---
<main>
  <div class="telemetry">
    <div class="rail" aria-hidden="true">
      <span class="glyph">␀</span>
      <span class="line"></span>
      <span class="glyph">␆</span>
    </div>
    <div class="readout">
      <h1>Nate Goldman</h1>
      <p class="role">software engineer</p>
      <ul class="links">
        {%- for link in links %}
        <li{% if link.hidden %} style="display:none"{% endif %}><a rel="me" title="{{ link.title }}" href="{{ link.url }}">{{ link.title }}</a></li>
        {%- endfor %}
      </ul>
    </div>
  </div>
</main>

<canvas id="canvas"></canvas>

<script src="galaxies.js"></script>
<script>
  galaxies()
</script>
